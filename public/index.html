<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minecraft Server Control</title>
    <style>
      html,
      body {
        font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b1220;
        color: #e6edf3;
        margin: 0;
      }
      .wrap {
        max-width: 980px;
        margin: 40px auto;
        padding: 24px;
        border: 1px solid #22304a;
        border-radius: 14px;
        background: #0f172a;
      }
      h1,
      h3 {
        margin-top: 0;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 14px 0;
      }
      input {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #2b3b5c;
        background: #0b1220;
        color: #e6edf3;
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #2b3b5c;
        background: #1e293b;
        color: #e6edf3;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid #2b3b5c;
        background: #111827;
      }
      pre {
        background: #0b1220;
        border: 1px solid #22304a;
        padding: 10px;
        border-radius: 10px;
        overflow: auto;
      }
      .kv {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 10px;
        align-items: center;
      }
      .muted {
        opacity: 0.85;
      }
      .section {
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Minecraft Server Control</h1>
      <div id="status" class="muted">loading…</div>

      <div class="row">
        <input id="targetInput" placeholder="container name or ID" style="min-width: 260px" />
        <button onclick="setTarget()">Use target</button>
        <button onclick="listContainers()">List containers</button>
      </div>

      <div class="row">
        <button onclick="refresh()">Refresh</button>
        <button onclick="restart()">Restart</button>
        <button onclick="startC()">Start</button>
        <button onclick="stopC()">Stop</button>
        <span class="pill">Set difficulty:</span>
        <button onclick="setDiff('peaceful')">Peaceful</button>
        <button onclick="setDiff('easy')">Easy</button>
        <button onclick="setDiff('normal')">Normal</button>
        <button onclick="setDiff('hard')">Hard</button>
      </div>

      <div class="row">
        <input id="renameInput" placeholder="new container name" style="min-width: 220px" />
        <button onclick="renameContainer()">Rename container</button>
      </div>

      <pre id="details"></pre>

      <div class="section">
        <h3>Whitelist / Allowlist</h3>
        <div class="row">
          <input id="playerInput" placeholder="Java username or Bedrock GamerTag" style="min-width: 320px" />
          <button onclick="enableWhitelist(true)">Enable</button>
          <button onclick="enableWhitelist(false)">Disable</button>
          <button onclick="addPlayer()">Add player</button>
          <button onclick="removePlayer()">Remove player</button>
        </div>
        <div id="whitelistNote" class="muted"></div>
        <pre id="whitelist"></pre>
      </div>

      <div class="section">
        <h3>Logs</h3>
        <div class="row">
          <input id="logLines" value="200" style="width: 100px" />
          <button onclick="showLogs()">Refresh logs</button>
        </div>
        <pre id="logs" style="max-height: 360px"></pre>
      </div>
    </div>

    <script>
      async function call(url, method = "GET", body) {
        const r = await fetch(url, {
          method,
          headers: body ? { "Content-Type": "application/json" } : {},
          body: body ? JSON.stringify(body) : undefined,
        });
        const text = await r.text();
        try {
          return JSON.parse(text);
        } catch {
          return { raw: text };
        }
      }

      function currentTarget() {
        return document.getElementById("targetInput").value || undefined;
      }

      async function refresh() {
        const t = await call("/api/target");
        if (t.target) document.getElementById("targetInput").value = t.target;
        const j = await call("/api/info");
        if (j.error) {
          document.getElementById("status").textContent = "Error: " + j.error;
          document.getElementById("details").textContent = "";
          return;
        }
        document.getElementById("status").innerHTML = `
          <div class="kv">
            <div>Target</div><div><strong>${j.target}</strong></div>
            <div>Container</div><div><strong>${j.name}</strong></div>
            <div>Edition</div><div><strong>${j.edition}</strong></div>
            <div>Status</div><div>${j.state} ${j.running ? "🟢" : "🔴"}</div>
            <div>Image</div><div>${j.image ?? "n/a"}</div>
            <div>Env difficulty</div><div><strong>${j.envDifficulty ?? "n/a"}</strong></div>
            <div>File difficulty</div><div>${j.fileDifficulty ?? "n/a"}</div>
            <div>Whitelist file</div><div>${j.whitelistFile ?? "n/a"}</div>
          </div>`;
        document.getElementById("details").textContent = JSON.stringify(j, null, 2);
        await loadWhitelist();
      }

      async function restart() {
        const j = await call("/api/restart", "POST", { name: currentTarget() });
        if (j.error) alert(j.error);
        else {
          await new Promise((r) => setTimeout(r, 800));
          refresh();
        }
      }

      async function startC() {
        const j = await call("/api/start", "POST", { name: currentTarget() });
        if (j.error) alert(j.error);
        else refresh();
      }

      async function stopC() {
        const j = await call("/api/stop", "POST", { name: currentTarget() });
        if (j.error) alert(j.error);
        else refresh();
      }

      async function setDiff(level) {
        if (!confirm("Change difficulty to " + level + "?")) return;
        const j = await call("/api/difficulty", "POST", {
          level,
          name: currentTarget(),
        });
        if (j.error) alert(j.error);
        else {
          await new Promise((r) => setTimeout(r, 1500));
          refresh();
        }
      }

      async function setTarget() {
        const name = document.getElementById("targetInput").value.trim();
        if (!name) return alert("enter a container name or ID");
        const j = await call("/api/target", "POST", { name });
        if (j.error) alert(j.error);
        else refresh();
      }

      async function listContainers() {
        const j = await call("/api/containers");
        if (j.error) return alert(j.error);
        const lines = j.containers
          .map((c) => `${c.name}  (${c.id.slice(0, 12)})  ${c.image}  ${c.status}`)
          .join("\n");
        document.getElementById("logs").textContent = lines || "No containers found";
      }

      async function renameContainer() {
        const newName = document.getElementById("renameInput").value.trim();
        if (!newName) return alert("enter a new name");
        const j = await call("/api/rename", "POST", {
          name: currentTarget(),
          newName,
        });
        if (j.error) alert(j.error);
        else {
          document.getElementById("targetInput").value = j.target;
          refresh();
        }
      }

      async function loadWhitelist() {
        const qs = new URLSearchParams();
        if (currentTarget()) qs.set("name", currentTarget());
        const j = await call("/api/whitelist" + (qs.toString() ? `?${qs.toString()}` : ""));
        if (j.error) {
          document.getElementById("whitelist").textContent = "Unavailable: " + j.error;
          document.getElementById("whitelistNote").textContent = "";
          return;
        }
        const label = j.edition === "bedrock" ? "Allowlist" : "Whitelist";
        document.getElementById("whitelist").textContent = `${label} file: ${j.file}\n\n${JSON.stringify(j.entries, null, 2)}`;
        document.getElementById("whitelistNote").textContent =
          j.edition === "bedrock"
            ? "Bedrock uses allowlist.json and the /allowlist command. If a GamerTag has spaces, enter it exactly as shown in Xbox Live."
            : "Java uses whitelist.json and the /whitelist command.";
      }

      async function enableWhitelist(enabled) {
        const j = await call("/api/whitelist/enable", "POST", {
          name: currentTarget(),
          enabled,
        });
        if (j.error) return alert(j.error);
        if (j.note) alert(j.note);
        await refresh();
      }

      async function addPlayer() {
        const player = document.getElementById("playerInput").value.trim();
        if (!player) return alert("enter a player name");
        const j = await call("/api/whitelist/add", "POST", {
          name: currentTarget(),
          player,
          autoEnable: true,
        });
        if (j.error) return alert(j.error);
        if (j.note) alert(j.note);
        await refresh();
      }

      async function removePlayer() {
        const player = document.getElementById("playerInput").value.trim();
        if (!player) return alert("enter a player name");
        const j = await call("/api/whitelist/remove", "POST", {
          name: currentTarget(),
          player,
        });
        if (j.error) return alert(j.error);
        if (j.note) alert(j.note);
        await refresh();
      }

      async function showLogs() {
        const lines = document.getElementById("logLines").value || "200";
        const qs = new URLSearchParams({ lines });
        if (currentTarget()) qs.set("name", currentTarget());
        const r = await fetch("/api/logs?" + qs.toString());
        const t = await r.text();
        document.getElementById("logs").textContent = t;
      }

      refresh();
    </script>
  </body>
</html>
